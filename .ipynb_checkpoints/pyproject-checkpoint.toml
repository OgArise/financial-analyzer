[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "financial-analyzer"
version = "0.2.0"
description = "Analyze financial transactions from CSV and generate text or JSON reports."
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "Og Arise" }]
license = { text = "MIT" }
keywords = ["finance", "analytics", "csv", "reporting", "risk-monitoring"]
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
]
dependencies = []

[project.optional-dependencies]
dev = [
  "pytest>=8.2",
  "pytest-cov>=5.0",
  "ruff>=0.6.0",
  "mypy>=1.11",
]

[project.urls]
Homepage = "https://github.com/your-username/financial-analyzer"
Repository = "https://github.com/your-username/financial-analyzer"

[project.scripts]
financial-analyzer = "financial_analyzer.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
addopts = "-ra --strict-markers --cov=financial_analyzer --cov-report=term-missing"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "N", "SIM", "C4"]

[tool.mypy]
python_version = "3.11"
files = ["src", "tests"]
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
no_implicit_optional = true
strict_equality = true
